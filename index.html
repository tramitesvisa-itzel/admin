<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Formularios</title>
    <link rel="stylesheet" href="styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">


    <script type="module" src="admin.js" defer></script>
</head>

<body>
    <header>
        <h1>Administración de Formularios</h1>
    </header>

    <main>
        <section class="filter-section">
            <h2>Filtrar Datos</h2>
            <label for="tipoSolicitudFilter">Tipo de Solicitud:</label>
            <select id="tipoSolicitudFilter"></select>

            <label for="numeroTelefonicoFilter">Número Telefónico:</label>
            <input type="text" id="numeroTelefonicoFilter">

            <label for="correoElectronicoFilter">Correo Electrónico:</label>
            <input type="email" id="correoElectronicoFilter">
        </section>

        <hr>

        <section class="table-section">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Tipo de Solicitud</th>
                        <th>Número Telefónico</th>
                        <th>Correo Electrónico</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="details" class="details-section" style="display: none;">
            <h2>Detalles del Registro</h2>
            <form id="detailsForm"></form>
            <button id="backButton">Regresar</button>
            <button id="deleteButton">Eliminar</button>
            <button id="downloadButton">Descargar</button>
        </section>
    </main>
</body>

</html>
